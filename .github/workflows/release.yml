name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2

      - run: bun install --frozen-lockfile

      - name: Build linux-x64
        run: bun build src/cli.ts --compile --minify --target=bun-linux-x64 --outfile pdc-linux-x64

      - name: Build linux-arm64
        run: bun build src/cli.ts --compile --minify --target=bun-linux-arm64 --outfile pdc-linux-arm64

      - name: Verify binaries exist
        run: ls -lh pdc-linux-x64 pdc-linux-arm64

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            pdc-linux-x64
            pdc-linux-arm64
